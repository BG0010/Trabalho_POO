spring.profiles.active=dev
spring.jpa.open-in-view=false

# Perfil padrão: 'dev' usa H2 em memória.
# Para executar com Supabase PostgreSQL:
#   set SUPABASE_DB_PASSWORD=SuaSenha
#   mvn spring-boot:run -Dspring-boot.run.profiles=supabase
# Para executar em produção com variáveis de ambiente:
#   set SPRING_DATASOURCE_URL=jdbc:postgresql://...
#   set SPRING_DATASOURCE_USERNAME=usuario
#   set SPRING_DATASOURCE_PASSWORD=senha
#   mvn spring-boot:run -Dspring-boot.run.profiles=prod

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
