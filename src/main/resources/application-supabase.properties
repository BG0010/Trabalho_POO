# Configuração para persistir tarefas no PostgreSQL do Supabase.
# Use o perfil 'supabase' para iniciar a aplicação com estas configurações.

spring.datasource.url=jdbc:postgresql://db.uyfasqrbfebpdpboxjsp.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false
logging.level.com.tarefas=DEBUG
