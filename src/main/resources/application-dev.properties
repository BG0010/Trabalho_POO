# =====================================================
# PERFIL DE DESENVOLVIMENTO - Banco de Dados H2 (Memória)
# =====================================================

# Configuração do banco H2 em memória
spring.datasource.url=jdbc:h2:mem:tarefasdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuração do Hibernate/JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console web do H2 - acesse em: http://localhost:8080/h2-console ou 8082/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging (opcional)
logging.level.root=INFO
logging.level.com.tarefas=DEBUG
logging.level.org.springframework.web=DEBUG
