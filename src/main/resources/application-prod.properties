# Produção: usar variáveis de ambiente
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# Strategy: don't drop production data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# =============================================
# PERFIL DE PRODUÇÃO - Banco PostgreSQL (Render)
# =============================================

# As variáveis de ambiente são configuradas no painel do Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - apenas atualiza as tabelas em produção (não recria)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desabilita o console H2 em produção
spring.h2.console.enabled=false
